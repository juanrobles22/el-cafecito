<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Cafecito – Zapata, Texas</title>

  <!-- ─── CUSTOM FONTS ─── -->
  <style>
    /* Worker Regular */
    @font-face {
      font-family: 'Worker';
      src: url('fonts/fonnts.com-Worker-.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }

    /* Worker Light */
    @font-face {
      font-family: 'Worker';
      src: url('fonts/fonnts.com-Worker-Light.otf') format('opentype');
      font-weight: 300;
      font-style: normal;
    }

    /* Worker Extra Bold */
    @font-face {
      font-family: 'Worker';
      src: url('fonts/fonnts.com-Worker-Extra-Bold.otf') format('opentype');
      font-weight: 800;
      font-style: normal;
    }

    /* Worker Black */
    @font-face {
      font-family: 'Worker';
      src: url('fonts/fonnts.com-Worker-Black.otf') format('opentype');
      font-weight: 900;
      font-style: normal;
    }

    /* ─── ROOT COLORS ─── */
    :root {
      --blue:       #325677;
      --blue-dark:  #1e3347;
      --blue-mid:   #254260;
      --blue-light: rgba(50,86,119,0.12);
      --white:      #ffffff;
      --off-white:  #f7f9fb;
      --black:      #000000;
      --near-black: #0d0d0d;
      --gray:       #555555;
      --light-gray: #e0e6ec;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--off-white);
      color: var(--near-black);
      font-family: 'Worker', sans-serif;
      font-weight: 400;
      overflow-x: hidden;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 3rem;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--light-gray);
    }
    .nav-brand { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
    .nav-brand img { height: 38px; width: 38px; object-fit: contain; }
    .nav-brand-text { font-family: 'Worker', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--near-black); letter-spacing: -0.02em; }
    .nav-brand-text em { font-style: italic; color: var(--blue); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--near-black); font-size: 0.78rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover { color: var(--blue); }
    .nav-cta { background: var(--blue) !important; color: var(--white) !important; padding: 0.5rem 1.2rem; border-radius: 2px; }
    .nav-cta:hover { background: var(--blue-dark) !important; color: var(--white) !important; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--near-black); border-radius: 2px; }

    /* ─── HERO ─── */
    .hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; padding-top: 72px; }
    .hero-left {
      background: var(--blue);
      display: flex; flex-direction: column; justify-content: center;
      padding: 6rem 4.5rem 6rem 5rem;
      position: relative; overflow: hidden;
    }
    .hero-left::before {
      content: ''; position: absolute;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,0,0,0.15) 0%, transparent 65%);
      bottom: -150px; left: -150px;
    }
    .hero-left::after {
      content: ''; position: absolute;
      width: 300px; height: 300px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
      top: 40px; right: -60px;
    }

    .hero-eyebrow { font-size: 0.7rem; letter-spacing: 0.28em; text-transform: uppercase; color: rgba(255,255,255,0.65); font-weight: 600; margin-bottom: 1.4rem; opacity: 0; animation: fadeUp 0.7s ease forwards 0.2s; font-family: 'Worker', sans-serif; font-weight: 300; }
    .hero-title { font-family: 'Worker', sans-serif; font-size: clamp(3.2rem, 5.5vw, 5.2rem); line-height: 1.0; color: var(--white); font-weight: 900; letter-spacing: -0.03em; opacity: 0; animation: fadeUp 0.7s ease forwards 0.35s; }
    .hero-title em { font-style: italic; color: rgba(255,255,255,0.75); display: block; font-weight: 300; }
    .hero-desc { font-size: 1.05rem; color: rgba(255,255,255,0.65); margin-top: 1.5rem; line-height: 1.75; font-weight: 300; opacity: 0; animation: fadeUp 0.7s ease forwards 0.5s; font-family: 'Worker', sans-serif; }

    /* ─── REST OF YOUR CSS … ─── */
    /* (Keep the rest of your existing CSS, just make sure all font-family uses 'Worker') */

  </style>
</head>
<body>
  <!-- NAV -->
  <nav>
    <a href="#" class="nav-brand">
      <img src="logo.webp" alt="El Cafecito" />
      <span class="nav-brand-text">El <em>Cafecito</em></span>
    </a>
    <button class="hamburger" aria-label="Toggle menu" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="#menu">Menu</a></li>
      <li><a href="#about-strip">About</a></li>
      <li><a href="#contact">Hours &amp; Location</a></li>
      <li><a href="https://www.facebook.com/search/top?q=el%20cafecito" target="_blank" class="nav-cta">Facebook</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-left">
      <p class="hero-eyebrow">Zapata, Texas &middot; Est. 2023</p>
      <h1 class="hero-title">El<br><em>Cafecito</em></h1>
      <p class="hero-desc">Mexican-inspired specialty drinks, community warmth, and creative flavors — right here in Zapata.</p>
      <div class="hero-actions">
        <a href="#menu" class="btn-primary">View Our Menu</a>
        <a href="#contact" class="btn-ghost">Find Us</a>
      </div>
    </div>
    <div class="hero-right">
      <div class="hero-visual">
        <div class="hero-logo-wrap">
          <img src="logo.webp" alt="El Cafecito logo" />
        </div>
      </div>
    </div>
  </section>

  <!-- … KEEP THE REST OF YOUR HTML … -->
</body>
</html>
